name: Build Installers
on:
  push:
    branches: [ main ]
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Download JavaFX
        run: |
          curl -L https://download2.gluonhq.com/openjfx/21.0.2/openjfx-21.0.2_windows-x64_bin-sdk.zip -o javafx.zip
          Expand-Archive javafx.zip -DestinationPath .
      - name: Remove conflicting jars
        run: Remove-Item "out/artifacts/PsychLog_jar/javafx.web.jar" -ErrorAction SilentlyContinue
      - name: Build EXE
        run: |
          jpackage --input out/artifacts/PsychLog_jar `
            --name PsychLog `
            --main-jar PsychLog.jar `
            --main-class com.psychlog.MainApp `
            --type exe `
            --icon icon.ico `
            --module-path javafx-sdk-21.0.2/lib `
            --add-modules javafx.controls,javafx.fxml,javafx.graphics,javafx.media,java.base,java.desktop,java.logging,java.naming,java.net.http,java.sql,java.xml `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: "*.exe"

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Download JavaFX
        run: |
          curl -L https://download2.gluonhq.com/openjfx/21.0.2/openjfx-21.0.2_osx-x64_bin-sdk.zip -o javafx.zip
          unzip javafx.zip
      - name: Remove conflicting jars
        run: rm -f out/artifacts/PsychLog_jar/javafx.web.jar
      - name: Build DMG
        run: |
          jpackage --input out/artifacts/PsychLog_jar \
            --name PsychLog \
            --main-jar PsychLog.jar \
            --main-class com.psychlog.MainApp \
            --type dmg \
            --icon icon.icns \
            --module-path javafx-sdk-21.0.2/lib \
            --add-modules javafx.controls,javafx.fxml,javafx.graphics,javafx.media,java.base,java.desktop,java.logging,java.naming,java.net.http,java.sql,java.xml
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: "*.dmg"
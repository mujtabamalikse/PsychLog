name: Build Installers

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Download JavaFX
        run: |
          curl -L https://download2.gluonhq.com/openjfx/21.0.2/openjfx-21.0.2_windows-x64_bin-sdk.zip -o javafx.zip
          Expand-Archive javafx.zip -DestinationPath .
      - name: Build EXE
        run: jpackage --input out/artifacts/PsychLog_jar --name PsychLog --main-jar PsychLog.jar --type exe --icon icon.ico --module-path openjfx-21.0.2/lib --add-modules javafx.controls,javafx.fxml,javafx.graphics,javafx.media
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: "*.exe"

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Download JavaFX
        run: |
          curl -L https://download2.gluonhq.com/openjfx/21.0.2/openjfx-21.0.2_osx-x64_bin-sdk.zip -o javafx.zip
          unzip javafx.zip
      - name: Build DMG
        run: jpackage --input out/artifacts/PsychLog_jar --name PsychLog --main-jar PsychLog.jar --type dmg --module-path javafx-sdk-21.0.2/lib --add-modules javafx.controls,javafx.fxml,javafx.graphics,javafx.media
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: "*.dmg"